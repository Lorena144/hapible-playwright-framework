name: Playwright CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

env:
  UI_BASE_URL: ${{ secrets.UI_BASE_URL }}
  API_BASE_URL: ${{ secrets.API_BASE_URL }}
  USERNAME_EMPLOYER: ${{ secrets.USERNAME_EMPLOYER }}
  PASSWORD_EMPLOYER: ${{ secrets.PASSWORD_EMPLOYER }}

jobs:

  api-tests:
    name: API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Playwright Environment
        uses: ./.github/actions/setup-playwright

      - name: Debug environment
        run: |
          echo "UI_BASE_URL=$UI_BASE_URL"
          echo "API_BASE_URL=$API_BASE_URL"

      - name: Run API Tests
        run: npm run test:api

      - name: Upload API Allure Results
        if: always()
        uses: ./.github/actions/upload-allure
        with:
          artifact-name: api-allure-results

      - name: Upload API Playwright Report
        if: always()
        uses: ./.github/actions/upload-playwright-report
        with:
          artifact-name: api-playwright-report

  ui-hybrid-tests:
    name: UI & Hybrid Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Playwright Environment
        uses: ./.github/actions/setup-playwright

      - name: Generate Storage State
        run: npm run test:setup

      - name: Debug login page
        if: always()
        run: |
          echo "===== LOGIN PAGE HEADERS ====="
          curl -I "$UI_BASE_URL/login.html"

          echo ""
          echo "===== LOGIN PAGE CONTENT ====="
          curl -L "$UI_BASE_URL/login.html" | head -40

      - name: Run UI Tests
        run: npm run test:ui        

      - name: Run Hybrid Tests
        run: npm run test:hybrid

      - name: Upload UI & Hybrid Allure Results
        if: always()
        uses: ./.github/actions/upload-allure
        with:
          artifact-name: ui-hybrid-allure-results

      - name: Upload UI & Hybrid Playwright Report
        if: always()
        uses: ./.github/actions/upload-playwright-report
        with:
          artifact-name: ui-hybrid-playwright-report

  publish-allure:
    name: Publish Allure Report
    needs:
      - api-tests
      - ui-hybrid-tests
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download API Allure Results
        uses: actions/download-artifact@v4
        with:
          name: api-allure-results
          path: allure-results/api

      - name: Download UI & Hybrid Allure Results
        uses: actions/download-artifact@v4
        with:
          name: ui-hybrid-allure-results
          path: allure-results/ui

      - name: Merge Allure Results
        run: |
          mkdir -p merged-results
          cp -r allure-results/api/* merged-results/ || true
          cp -r allure-results/ui/* merged-results/ || true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Generate Allure Report
        run: allure generate merged-results --clean -o allure-report

      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report