name: Upload Allure Results

description: Upload Allure Results as GitHub Artifact

inputs:
  artifact-name:
    description: Artifact name
    required: true

runs:
  using: composite

  steps:
    - name: Upload Allure Results
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: allure-results/